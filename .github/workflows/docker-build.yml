name: Docker Build and Push

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Update yt-dlp version in requirements.txt
        run: |
          LATEST_VERSION=$(pip index versions yt-dlp 2>&1 | grep -oP '(?<=Latest version: )[\d.]+')
          if [ -n "$LATEST_VERSION" ]; then
            sed -i "s/yt-dlp==.*/yt-dlp==$LATEST_VERSION/" requirements.txt
            echo "Updated yt-dlp to latest version: $LATEST_VERSION"
          else
            echo "Could not find latest yt-dlp version, using existing"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/web-video-downloader:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/web-video-downloader:${{ github.sha }}

      - name: Logout from Docker Hub
        uses: docker/login-action@v2
        with:
          logout: true