<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抖音视频下载器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fe2c55 0%, #25f4ee 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 480px; margin: 0 auto; padding-top: 30px; }
        .logo { text-align: center; margin-bottom: 24px; color: #fff; }
        .logo .icon { font-size: 56px; }
        .logo h1 { font-size: 26px; margin: 8px 0; }
        .badge {
            display: inline-block;
            background: rgba(255,255,255,.25);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin: 4px;
        }
        .badge.ok { background: rgba(76,175,80,.85); }
        .badge.warn { background: rgba(244,67,54,.85); }
        .badge.scan { background: rgba(255,152,0,.85); }
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,.25);
        }
        label { display: block; color: #666; font-size: 14px; margin-bottom: 8px; font-weight: 500; }
        input[type=text] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            margin-bottom: 12px;
        }
        input:focus { outline: none; border-color: #fe2c55; }
        .row { display: flex; gap: 8px; margin-bottom: 16px; }
        .row button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #f0f0f0;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #fe2c55, #ff6b8a);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
        .btn-secondary {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #25f4ee, #1cb5b0);
            color: #111;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: none;
        }
        .quality-group { display: none; margin-bottom: 16px; }
        .quality-group.show { display: block; }
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
        }
        .result {
            display: none;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            line-height: 1.6;
        }
        .result.show { display: block; }
        .result.ok { background: #e8f5e9; color: #2e7d32; }
        .result.err { background: #ffebee; color: #c62828; }
        .result.warn { background: #fff8e1; color: #f57c00; }
        .video-info { display: flex; gap: 12px; margin-top: 8px; }
        .video-info img {
            width: 72px; height: 72px;
            border-radius: 8px; object-fit: cover;
            background: #eee;
        }
        .video-title { font-weight: 600; word-break: break-all; }
        .video-meta { font-size: 12px; color: #888; margin-top: 4px; }
        .btn-dl {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 18px;
            background: #4caf50;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
        }
        .footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(255,255,255,.85);
            font-size: 12px;
        }
        .loading {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .qr-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.65);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .qr-overlay.show { display: flex; }
        .qr-box {
            background: #fff;
            border-radius: 20px;
            padding: 28px;
            max-width: 340px;
            width: 100%;
            text-align: center;
        }
        .qr-box h2 { font-size: 18px; margin-bottom: 8px; }
        .qr-box p { color: #666; font-size: 13px; margin-bottom: 16px; }
        .qr-box img {
            width: 220px; height: 220px;
            object-fit: contain;
            border: 1px solid #eee;
            border-radius: 8px;
        }
        .qr-placeholder {
            width: 220px; height: 220px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="icon">🎵</div>
            <h1>抖音视频下载</h1>
            <span class="badge" id="version">v2.0.0</span>
            <span class="badge" id="cookieBadge">Cookie 检测中</span>
        </div>

        <div class="card">
            <label for="url">抖音分享链接</label>
            <input type="text" id="url" placeholder="粘贴 v.douyin.com 或分享口令">
            <div class="row">
                <button type="button" onclick="pasteUrl()">粘贴</button>
                <button type="button" onclick="clearAll()">清空</button>
            </div>

            <div class="quality-group" id="qualityGroup">
                <label for="quality">画质</label>
                <select id="quality"></select>
            </div>

            <button class="btn-primary" id="parseBtn" onclick="parseVideo()">
                <span id="parseText">解析视频</span>
            </button>
            <button class="btn-secondary" id="downloadBtn" onclick="downloadVideo()">
                <span id="dlText">下载视频</span>
            </button>

            <div class="result" id="result"><div id="resultBody"></div></div>
        </div>

        <div class="footer">
            <p>基于 Evil0ctal/Douyin_TikTok_Download_API · 仅个人学习</p>
        </div>
    </div>

    <div class="qr-overlay" id="qrOverlay">
        <div class="qr-box">
            <h2>抖音扫码登录</h2>
            <p id="qrHint">请使用抖音 App 扫描下方二维码</p>
            <div id="qrImageWrap">
                <div class="qr-placeholder"><span class="loading" style="border-color:#fe2c55;border-top-color:transparent"></span></div>
            </div>
            <p style="margin-top:12px;font-size:12px;color:#999" id="qrStatus">正在生成二维码...</p>
        </div>
    </div>

    <script>
        let pollTimer = null;

        function showQrOverlay(show) {
            document.getElementById('qrOverlay').classList.toggle('show', show);
        }

        function setQrImage(b64) {
            const wrap = document.getElementById('qrImageWrap');
            if (b64) {
                wrap.innerHTML = '<img src="data:image/png;base64,' + b64 + '" alt="登录二维码">';
            } else {
                wrap.innerHTML = '<div class="qr-placeholder"><span class="loading" style="border-color:#fe2c55;border-top-color:transparent"></span></div>';
            }
        }

        function updateCookieBadge(st) {
            const el = document.getElementById('cookieBadge');
            el.className = 'badge';
            if (st.status === 'valid') {
                el.textContent = '✅ 已登录';
                el.classList.add('ok');
                showQrOverlay(false);
            } else if (st.status === 'scanning') {
                el.textContent = '⏳ 扫码中';
                el.classList.add('scan');
                showQrOverlay(true);
            } else {
                el.textContent = '⚠️ 需扫码登录';
                el.classList.add('warn');
            }
        }

        async function pollCookieStatus() {
            try {
                const r = await fetch('/api/cookie/status');
                const st = await r.json();
                updateCookieBadge(st);
                document.getElementById('qrStatus').textContent = st.message || '';
                if (st.qrCode) setQrImage(st.qrCode);
                if (st.status === 'valid') {
                    clearInterval(pollTimer);
                    pollTimer = null;
                    showQrOverlay(false);
                    return;
                }
                if (st.status === 'invalid' && !st.qrCode && pollTimer) {
                    document.getElementById('qrStatus').textContent = st.message || '登录失败，请刷新重试';
                }
            } catch (e) {}
        }

        async function ensureLogin() {
            const r = await fetch('/api/cookie/status');
            const st = await r.json();
            updateCookieBadge(st);
            if (st.status === 'valid') return true;

            showQrOverlay(true);
            setQrImage('');
            document.getElementById('qrStatus').textContent = '正在生成二维码...';
            await fetch('/api/cookie/qrcode', { method: 'POST' });

            if (!pollTimer) {
                pollTimer = setInterval(pollCookieStatus, 1500);
            }
            pollCookieStatus();
            return false;
        }

        async function initApp() {
            try {
                const r = await fetch('/api/version');
                const d = await r.json();
                document.getElementById('version').textContent = d.version || 'v2.0.0';
            } catch (e) {}

            const st = await (await fetch('/api/cookie/status')).json();
            updateCookieBadge(st);
            if (st.status !== 'valid') {
                await ensureLogin();
            } else {
                setInterval(async () => {
                    const s = await (await fetch('/api/cookie/status')).json();
                    updateCookieBadge(s);
                    if (s.status === 'invalid') await ensureLogin();
                }, 60000);
            }
        }

        function showResult(html, type) {
            const box = document.getElementById('result');
            document.getElementById('resultBody').innerHTML = html;
            box.className = 'result show ' + type;
        }

        async function pasteUrl() {
            try {
                document.getElementById('url').value = await navigator.clipboard.readText();
            } catch (e) {
                document.getElementById('url').focus();
            }
        }

        function clearAll() {
            document.getElementById('url').value = '';
            document.getElementById('result').className = 'result';
            document.getElementById('qualityGroup').classList.remove('show');
            document.getElementById('downloadBtn').style.display = 'none';
        }

        function populateQuality(qualities, def) {
            const sel = document.getElementById('quality');
            sel.innerHTML = '';
            const opts = [{ v: 'best', l: '最佳画质' }];
            (qualities || []).forEach(q => opts.push({ v: String(q), l: q + 'P' }));
            const seen = new Set();
            opts.forEach(o => {
                if (seen.has(o.v)) return;
                seen.add(o.v);
                const op = document.createElement('option');
                op.value = o.v;
                op.textContent = o.l;
                if (String(def) === o.v) op.selected = true;
                sel.appendChild(op);
            });
            document.getElementById('qualityGroup').classList.add('show');
        }

        async function parseVideo() {
            if (!(await ensureLogin())) return;

            const url = document.getElementById('url').value.trim();
            if (!url) { showResult('<p>请输入抖音链接</p>', 'err'); return; }

            const btn = document.getElementById('parseBtn');
            const txt = document.getElementById('parseText');
            btn.disabled = true;
            txt.innerHTML = '<span class="loading"></span>解析中...';

            try {
                const r = await fetch('/api/info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const d = await r.json();
                if (d.needLogin) { await ensureLogin(); return; }
                if (d.success) {
                    let thumb = '<div style="width:72px;height:72px;background:#eee;border-radius:8px"></div>';
                    if (d.thumbnail) thumb = '<img src="' + d.thumbnail + '" />';
                    showResult(
                        '<div class="video-info">' + thumb +
                        '<div><div class="video-title">' + escapeHtml(d.title) + '</div>' +
                        (d.author ? '<div class="video-meta">作者: ' + escapeHtml(d.author) + '</div>' : '') +
                        '</div></div>', 'ok');
                    populateQuality(d.qualities, d.defaultQuality);
                    document.getElementById('downloadBtn').style.display = 'block';
                } else {
                    showResult('<p>' + (d.error || '解析失败') + '</p>', 'err');
                }
            } catch (e) {
                showResult('<p>网络错误</p>', 'err');
            } finally {
                btn.disabled = false;
                txt.textContent = '解析视频';
            }
        }

        async function downloadVideo() {
            if (!(await ensureLogin())) return;

            const url = document.getElementById('url').value.trim();
            const quality = document.getElementById('quality').value;
            const btn = document.getElementById('downloadBtn');
            const txt = document.getElementById('dlText');
            btn.disabled = true;
            txt.innerHTML = '<span class="loading"></span>下载中...';

            try {
                const r = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, quality })
                });
                const d = await r.json();
                if (d.needLogin) { await ensureLogin(); return; }
                if (d.success) {
                    const mb = (d.fileSize / 1024 / 1024).toFixed(2);
                    showResult(
                        document.getElementById('resultBody').innerHTML +
                        '<p style="margin-top:10px">大小: ' + mb + ' MB</p>' +
                        '<a class="btn-dl" href="' + d.videoUrl + '" download>📥 保存视频</a>', 'ok');
                } else {
                    showResult('<p>' + (d.error || '下载失败') + '</p>', 'err');
                }
            } catch (e) {
                showResult('<p>网络错误</p>', 'err');
            } finally {
                btn.disabled = false;
                txt.textContent = '下载视频';
            }
        }

        function escapeHtml(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        document.getElementById('url').addEventListener('keypress', e => {
            if (e.key === 'Enter') parseVideo();
        });

        initApp();
    </script>
</body>
</html>
